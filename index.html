<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Samuni Prototype</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
</head>

<body class="flex flex-col items-center justify-center h-screen">

    <!-- GAME CANVAS -->
    <canvas id="gameplay-screen" class="w-full h-full absolute inset-0"></canvas>

    <!-- UI OVERLAY -->
    <div id="ui-layer" class="absolute inset-0 z-10 flex flex-col justify-between p-4 text-white">
        <div class="flex justify-between items-start">
            <div class="flex flex-col gap-2">
                <div class="stat-badge text-red-400">DMG: <span id="val-dmg">0</span></div>
                <div class="stat-badge text-blue-400">NRG: <span id="val-nrg">0</span></div>
            </div>
            <div class="stat-badge text-yellow-400">COINS: <span id="val-coins">0</span></div>
        </div>

        <div class="flex justify-center pb-8">
            <div class="stat-badge text-purple-400">CORE: <span id="val-core">0</span>%</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
